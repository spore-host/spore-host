name: Substrate Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  substrate-tests:
    runs-on: ubuntu-latest
    # No AWS credentials needed — all AWS calls go to the Substrate emulator.
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Test spawn (Substrate-backed)
        run: |
          cd spawn
          go test -v -coverprofile=coverage.out -covermode=atomic \
            ./pkg/aws/... \
            ./pkg/registry/... \
            ./pkg/scheduler/... \
            ./pkg/autoscaler/... \
            ./pkg/security/... \
            ./pkg/staging/... \
            ./pkg/alerts/... \
            ./pkg/availability/... \
            ./pkg/cost/... \
            ./pkg/locality/... \
            ./pkg/sweep/... \
            ./pkg/infrastructure/... \
            ./pkg/config/... \
            ./pkg/orchestrator/... \
            ./pkg/agent/... \
            ./pkg/pipeline/...

      - name: Test truffle (Substrate-backed)
        run: |
          cd truffle
          go test -v -coverprofile=coverage.out -covermode=atomic \
            ./pkg/aws/... \
            ./pkg/quotas/...

      - name: Upload spawn coverage
        uses: codecov/codecov-action@v6
        with:
          files: spawn/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload truffle coverage
        uses: codecov/codecov-action@v6
        with:
          files: truffle/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
