name: Integration Tests

on:
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC
  workflow_dispatch:

jobs:
  integration-tests-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_INTEGRATION_TEST_ROLE }}
          role-session-name: spawn-integration-tests
          aws-region: us-east-1

      - name: Build spawn binary
        run: |
          cd spawn
          go build -o bin/spawn .

      - name: Run scheduler integration tests
        run: |
          cd spawn
          go test -v -tags=integration -run TestScheduler -timeout 20m ./...

      - name: Cleanup test resources
        if: always()
        run: |
          aws dynamodb scan \
            --table-name spawn-schedules \
            --filter-expression "begins_with(schedule_id, :prefix)" \
            --expression-attribute-values '{":prefix":{"S":"test-"}}' \
            --projection-expression "schedule_id" \
            --query 'Items[].schedule_id.S' \
            --output text 2>/dev/null \
          | tr '\t' '\n' \
          | xargs -I {} aws dynamodb delete-item \
              --table-name spawn-schedules \
              --key '{"schedule_id":{"S":"{}"}}' 2>/dev/null || true

          aws s3 rm s3://spawn-schedules-us-east-1/test/ --recursive 2>/dev/null || true

  integration-tests-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_INTEGRATION_TEST_ROLE }}
          role-session-name: spawn-integration-tests-queue
          aws-region: us-east-1

      - name: Build spawn binary
        run: |
          cd spawn
          go build -o bin/spawn .
          go build -o bin/spored ./cmd/spored/

      - name: Run queue integration tests
        run: |
          cd spawn
          go test -v -tags=integration -run TestQueue -timeout 20m ./...

      - name: Cleanup test resources
        if: always()
        run: |
          aws s3 rm s3://spawn-queue-results-test/test/ --recursive 2>/dev/null || true
