name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC

permissions:
  contents: read

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck - root
        run: govulncheck ./...

      - name: govulncheck - spawn
        run: cd spawn && govulncheck ./...

      - name: govulncheck - truffle
        run: cd truffle && govulncheck ./...

      - name: govulncheck - lagotto
        run: cd lagotto && govulncheck ./...

      - name: govulncheck - pkg/i18n
        run: cd pkg/i18n && govulncheck ./...

      - name: govulncheck - pkg/pricing
        run: cd pkg/pricing && govulncheck ./...

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  trivy-image:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t sporedothost/spawn:scan -f spawn/Dockerfile .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sporedothost/spawn:scan
          severity: HIGH,CRITICAL
          exit-code: 1

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Semgrep scan
        run: semgrep scan --config=auto --error .
