# Goreleaser configuration for spore-host (truffle + spawn)
# https://goreleaser.com

version: 2

# Build configurations for both truffle and spawn
builds:
  # truffle - EC2 instance search tool
  - id: truffle
    dir: truffle
    main: .
    binary: truffle
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/spore-host/spore-host/truffle/cmd.Version={{.Version}}
      - -X github.com/spore-host/spore-host/truffle/cmd.GitCommit={{.Commit}}
      - -X github.com/spore-host/spore-host/truffle/cmd.BuildDate={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

  # spawn - EC2 instance launcher
  - id: spawn
    dir: spawn
    main: .
    binary: spawn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/spore-host/spore-host/spawn/cmd.Version={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'

  # lagotto - EC2 capacity watcher
  - id: lagotto
    dir: lagotto
    main: .
    binary: lagotto
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/spore-host/spore-host/lagotto/cmd.Version={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'

  # spore-host-mcp - MCP server for AI assistants
  - id: spore-host-mcp
    dir: mcp
    main: .
    binary: spore-host-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'

  # spored - Daemon (Linux only)
  - id: spored
    dir: spawn
    main: ./cmd/spored
    binary: spored
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    mod_timestamp: '{{ .CommitTimestamp }}'

# Archive configuration
archives:
  - id: truffle-archive
    name_template: 'truffle_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    ids:
      - truffle
    files:
      - LICENSE*

  - id: spawn-archive
    ids:
      - spawn
    name_template: 'spawn_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE*

  - id: lagotto-archive
    ids:
      - lagotto
    name_template: 'lagotto_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE*

  - id: spore-host-mcp-archive
    ids:
      - spore-host-mcp
    name_template: 'spore-host-mcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE*

  - id: spored-archive
    ids:
      - spored
    name_template: 'spored_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE*

# Checksums
checksum:
  name_template: 'checksums.txt'

# Snapshot builds (for testing)
snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Changelog
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'typo'
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Security updates'
      regexp: '^.*?sec(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

# Linux Packages (DEB + RPM via nFPM)
nfpms:
  - id: truffle-pkg
    package_name: truffle
    ids:
      - truffle
    vendor: spore.host
    homepage: https://spore.host
    maintainer: "spore.host <hello@spore.host>"
    description: "Find and discover AWS EC2 instance types"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/truffle/copyright
        type: doc
    rpm:
      summary: "Find and discover AWS EC2 instance types"

  - id: spawn-pkg
    package_name: spawn
    ids:
      - spawn
    vendor: spore.host
    homepage: https://spore.host
    maintainer: "spore.host <hello@spore.host>"
    description: "Launch ephemeral AWS EC2 instances effortlessly"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/spawn/copyright
        type: doc
    rpm:
      summary: "Launch ephemeral AWS EC2 instances effortlessly"

  - id: lagotto-pkg
    package_name: lagotto
    ids:
      - lagotto
    vendor: spore.host
    homepage: https://spore.host
    maintainer: "spore.host <hello@spore.host>"
    description: "Watch for EC2 instance capacity across regions"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/lagotto/copyright
        type: doc
    rpm:
      summary: "Watch for EC2 instance capacity across regions"

  - id: spore-host-mcp-pkg
    package_name: spore-host-mcp
    ids:
      - spore-host-mcp
    vendor: spore.host
    homepage: https://spore.host
    maintainer: "spore.host <hello@spore.host>"
    description: "MCP server for AI assistants — manage EC2 instances and discover capacity"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/spore-host-mcp/copyright
        type: doc
    rpm:
      summary: "MCP server for AI assistants — manage EC2 instances and discover capacity"

  - id: spored-pkg
    package_name: spored
    ids:
      - spored
    vendor: spore.host
    homepage: https://spore.host
    maintainer: "spore.host <hello@spore.host>"
    description: "Background monitoring daemon for spawn-managed EC2 instances"
    license: Apache-2.0
    formats:
      - deb
      - rpm
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/spored/copyright
        type: doc
    rpm:
      summary: "Background monitoring daemon for spawn-managed EC2 instances"

# Homebrew Tap
brews:
  - name: truffle
    ids:
      - truffle-archive
    repository:
      owner: spore-host
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/spore-host/spore-host
    description: "Find and discover AWS EC2 instance types"
    license: Apache-2.0
    test: |
      system "#{bin}/truffle", "version"
    install: |
      bin.install "truffle"

  - name: spawn
    ids:
      - spawn-archive
    repository:
      owner: spore-host
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/spore-host/spore-host
    description: "Launch ephemeral AWS EC2 instances effortlessly"
    license: Apache-2.0
    dependencies:
      - name: spore-host/tap/truffle
        type: runtime
    test: |
      system "#{bin}/spawn", "version"
    install: |
      bin.install "spawn"
    post_install: |
      system "#{bin}/spawn", "_register-install"
    caveats: |
      spore.host has registered this installation. Run `spawn _unregister-install` before removing manually.
    def uninstall
      system "#{bin}/spawn", "_unregister-install"
    end

  - name: lagotto
    ids:
      - lagotto-archive
    repository:
      owner: spore-host
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/spore-host/spore-host
    description: "Watch for EC2 instance capacity across regions"
    license: Apache-2.0
    dependencies:
      - name: spore-host/tap/truffle
        type: runtime
    test: |
      system "#{bin}/lagotto", "version"
    install: |
      bin.install "lagotto"

  - name: spore-host-mcp
    ids:
      - spore-host-mcp-archive
    repository:
      owner: spore-host
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/spore-host/spore-host
    description: "MCP server for AI assistants — manage EC2 instances and discover capacity"
    license: Apache-2.0
    install: |
      bin.install "spore-host-mcp"

# Scoop Bucket
scoops:
  - name: truffle
    ids:
      - truffle-archive
    repository:
      owner: spore-host
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/spore-host/spore-host
    description: "Find and discover AWS EC2 instance types"
    license: Apache-2.0

  - name: spawn
    ids:
      - spawn-archive
    repository:
      owner: spore-host
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/spore-host/spore-host
    description: "Launch ephemeral AWS EC2 instances effortlessly"
    license: Apache-2.0
    depends:
      - spore-host/truffle
    post_install: "spawn _register-install"
    pre_uninstall: "spawn _unregister-install"

  - name: lagotto
    ids:
      - lagotto-archive
    repository:
      owner: spore-host
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/spore-host/spore-host
    description: "Watch for EC2 instance capacity across regions"
    license: Apache-2.0
    depends:
      - spore-host/truffle

  - name: spore-host-mcp
    ids:
      - spore-host-mcp-archive
    repository:
      owner: spore-host
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/spore-host/spore-host
    description: "MCP server for AI assistants — manage EC2 instances and discover capacity"
    license: Apache-2.0

# GitHub Release
release:
  github:
    owner: spore-host
    name: spore-host
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## spore-host {{ .Tag }}

    The underground network for AWS compute.

    ### What's New
  footer: |
    ---

    **Installation:**

    **Homebrew (macOS/Linux):**
    ```bash
    brew install spore-host/tap/truffle
    brew install spore-host/tap/spawn
    brew install spore-host/tap/spore-host-mcp
    ```

    **Scoop (Windows):**
    ```powershell
    scoop bucket add spore-host https://github.com/spore-host/scoop-bucket
    scoop install truffle
    scoop install spawn
    scoop install spore-host-mcp
    ```

    **Debian/Ubuntu (.deb):**
    ```bash
    curl -LO https://github.com/spore-host/spore-host/releases/download/{{ .Tag }}/truffle_{{ .Version }}_linux_amd64.deb
    sudo dpkg -i truffle_{{ .Version }}_linux_amd64.deb
    ```

    **RHEL/Fedora (.rpm):**
    ```bash
    sudo rpm -i https://github.com/spore-host/spore-host/releases/download/{{ .Tag }}/truffle_{{ .Version }}_linux_amd64.rpm
    ```

    **Manual Download:**
    Download the appropriate archive for your platform below.

    ---

    **Documentation:**
    - [README](https://github.com/spore-host/spore-host/blob/main/README.md)
    - [Security Guide](https://github.com/spore-host/spore-host/blob/main/SECURITY.md)
    - [Deployment Guide](https://github.com/spore-host/spore-host/blob/main/DEPLOYMENT_GUIDE.md)
    - [IAM Permissions](https://github.com/spore-host/spore-host/blob/main/spawn/IAM_PERMISSIONS.md)

  name_template: "v{{.Version}}"

